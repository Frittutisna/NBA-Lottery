<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Draft Lottery Simulator</title>
    <link rel="icon" type="image/x-icon" href="helper/picture/logo.png">
    <link rel="stylesheet" href="style.css">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nba-lottery-rittu.vercel.app/">
    <meta property="og:title" content="NBA Draft Lottery Simulator">
    <meta property="og:description" content="Simulate the NBA Draft Lottery from 2006 to 2026. Can you repeat the historic lottery jumps?">
    <meta property="og:image" content="https://nba-lottery-rittu.vercel.app/helper/picture/banner.jpg">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://nba-lottery-rittu.vercel.app/">
    <meta property="twitter:title" content="NBA Lottery Simulator">
    <meta property="twitter:description" content="Simulate the NBA Draft Lottery from 2006 to 2026. Can you repeat the historic lottery jumps?">
    <meta property="twitter:image" content="https://nba-lottery-rittu.vercel.app/helper/picture/banner.jpg">
</head>
<body>
    <header>NBA Draft Lottery Simulator</header>
    <div class="content">
        <div class="dropdown-container">
            <select name="year" id="year-select"></select>
            <button type="button" id="start-button">Start</button>
            <button type="button" id="skip-button" disabled>Skip</button>
        </div>
        <div class="draft-grid">
            <div class="draft-item">
                <div class="draft-number">1</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">2</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">3</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">4</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">5</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">6</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">7</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">8</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">9</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">10</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">11</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">12</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">13</div>
                <div class="draft-team"></div>
            </div>
            <div class="draft-item">
                <div class="draft-number">14</div>
                <div class="draft-team"></div>
            </div>
        </div>
        <div class="trade-shift"><ul></ul></div>
        <div class="info-footer">
            <div class="result-ID"></div>
            <div class="actual-ID"></div>
        </div>
    </div>
    <footer>2026 @ Frittutisna</footer>
    <script type="module" src="index.js"></script>
</body>
</html>
